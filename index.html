<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para alguien especial ✨💖</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="particles"></canvas>

<div class="moon" id="moon">
  <svg width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="moonGrad" cx="35%" cy="28%" r="65%">
        <stop offset="0%"   stop-color="#fffef5"/>
        <stop offset="18%"  stop-color="#fff8c0"/>
        <stop offset="45%"  stop-color="#ffd700"/>
        <stop offset="72%"  stop-color="#e8a000"/>
        <stop offset="100%" stop-color="#8c5600"/>
      </radialGradient>
      <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,220,60,.4)"/>
        <stop offset="100%" stop-color="rgba(255,160,0,0)"/>
      </radialGradient>
      <mask id="crescent">
        <rect width="110" height="110" fill="white"/>
        <circle cx="72" cy="48" r="36" fill="black"/>
      </mask>
      <filter id="moonBlur">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="46" cy="55" r="44" fill="url(#moonGlow)" opacity=".7"/>
    <circle cx="46" cy="55" r="36" fill="url(#moonGrad)" mask="url(#crescent)" filter="url(#moonBlur)"/>
    <ellipse cx="32" cy="38" rx="9" ry="6" fill="rgba(255,255,240,.55)"
             transform="rotate(-30,32,38)" mask="url(#crescent)"/>
    <circle cx="58" cy="24" r="1.4" fill="rgba(255,255,220,.9)"/>
    <circle cx="68" cy="32" r="1.0" fill="rgba(255,255,220,.7)"/>
    <circle cx="62" cy="40" r="0.7" fill="rgba(255,255,200,.6)"/>
  </svg>
</div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="poem-wrapper">
  <div class="poem-line-decor"></div>
  <div class="glow-text" id="poemText">
    <span class="line fade-in" style="--d:0.3s">Girl, you're my reflection <span class="sparkle">✨</span></span>
    <span class="line fade-in" style="--d:0.6s">all I see is you</span>
    <span class="line spacer"></span>
    <span class="line fade-in italic accent" style="--d:0.9s">My reflection,</span>
    <span class="line fade-in" style="--d:1.1s">in everything I do</span>
    <span class="line spacer"></span>
    <span class="line fade-in" style="--d:1.4s">You're my reflection <span class="heart-icon">💖</span></span>
    <span class="line fade-in" style="--d:1.7s">and all I see is you</span>
    <span class="line spacer"></span>
    <span class="line fade-in italic accent" style="--d:2.0s">My reflection,</span>
    <span class="line fade-in" style="--d:2.3s">in everything I do</span>
  </div>
  <div class="poem-line-decor"></div>
</div>

<div class="bouquet-container">
  <div class="bouquet" id="bouquet"></div>
  <div class="bouquet-base"></div>
</div>

<button class="music-btn" id="playBtn">
  <span class="btn-icon">🎵</span>
  <span class="btn-label">Reproducir canción</span>
</button>

<audio id="music" loop>
  <source src="NinademisOjos.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
